<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCD Corp — Entity Relationship Diagram</title>
<style>
  :root {
    --bg: #070b10;
    --surface: #0e1520;
    --surface2: #131d2e;
    --border: #1e2d42;
    --text: #c9d4e3;
    --muted: #5a6a80;
    --pk: #f0c060;
    --fk: #60a8f0;

    --master:    #3b82f6;
    --sales:     #10b981;
    --finance:   #f59e0b;
    --marketing: #ec4899;
    --social:    #a855f7;
    --supply:    #14b8a6;
    --mfg:       #f97316;
    --hr:        #e11d48;
    --support:   #6366f1;
    --observ:    #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    overflow: hidden;
    user-select: none;
  }
  /* ── header ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
    background: linear-gradient(90deg, #0a1020 0%, #0e1830 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  #header .logo { font-size: 15px; font-weight: 700; letter-spacing: .05em; color: #fff; }
  #header .logo span { color: var(--master); }
  #header .subtitle { color: var(--muted); font-size: 10px; }
  #header .stats { margin-left: auto; display: flex; gap: 20px; }
  #header .stat { text-align: center; }
  #header .stat .n { font-size: 17px; font-weight: 700; color: #fff; }
  #header .stat .l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  #controls {
    position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
    height: 38px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; padding: 0 14px;
  }
  .ctrl-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 4px 10px; border-radius: 4px;
    cursor: pointer; font: inherit; font-size: 10px;
    transition: all .15s;
  }
  .ctrl-btn:hover { border-color: var(--master); color: #fff; }
  .ctrl-btn.active { border-color: var(--master); background: rgba(59,130,246,.15); color: var(--master); }
  #search {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 4px 10px; border-radius: 4px;
    font: inherit; font-size: 10px; width: 160px;
    outline: none;
  }
  #search:focus { border-color: var(--master); }
  #zoom-info { margin-left: auto; color: var(--muted); font-size: 10px; }

  /* ── legend ── */
  #legend {
    position: fixed; bottom: 14px; left: 14px; z-index: 100;
    background: rgba(14,21,32,.92); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; flex-wrap: wrap; gap: 8px 16px; max-width: 420px;
  }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  /* ── tooltip ── */
  #tooltip {
    position: fixed; z-index: 200; pointer-events: none;
    background: rgba(7,11,16,.97); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-size: 10px;
    max-width: 260px; line-height: 1.6; display: none;
  }
  #tooltip .tt-title { font-weight: 700; color: #fff; margin-bottom: 4px; }
  #tooltip .tt-col { color: var(--muted); }
  #tooltip .tt-col .pk { color: var(--pk); }
  #tooltip .tt-col .fk { color: var(--fk); }
  /* ── canvas ── */
  #stage {
    position: fixed;
    top: 90px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #stage.grabbing { cursor: grabbing; }
  #world { position: absolute; transform-origin: 0 0; }
  /* ── SVG lines ── */
  #svg-layer {
    position: absolute; top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
  .fk-line {
    fill: none;
    stroke-width: 1.2;
    opacity: .4;
    transition: opacity .2s;
  }
  .fk-line.highlighted { opacity: .95; stroke-width: 2; }
  .fk-line.dimmed { opacity: .05; }
  /* ── table cards ── */
  .tbl-card {
    position: absolute;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    min-width: 148px;
    max-width: 178px;
    cursor: default;
    transition: border-color .2s, box-shadow .2s;
    z-index: 10;
  }
  .tbl-card:hover { z-index: 50; }
  .tbl-card.selected {
    z-index: 60;
    box-shadow: 0 0 0 2px var(--accent-color, var(--master));
  }
  .tbl-card.dimmed { opacity: .3; }
  .tbl-header {
    padding: 6px 9px 5px;
    border-radius: 5px 5px 0 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px;
  }
  .tbl-header .domain-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .tbl-header .tbl-name {
    font-weight: 700; font-size: 10.5px;
    color: #fff; letter-spacing: .02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tbl-body { padding: 4px 0; }
  .col-row {
    display: flex; align-items: center; gap: 4px;
    padding: 1.5px 9px; font-size: 9.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .col-row .badge {
    font-size: 7.5px; font-weight: 700;
    padding: 0 3px; border-radius: 2px; flex-shrink: 0;
    letter-spacing: .04em;
  }
  .badge-pk { background: rgba(240,192,96,.15); color: var(--pk); }
  .badge-fk { background: rgba(96,168,240,.15); color: var(--fk); }
  .col-name { color: var(--text); }
  .col-name.is-pk { color: var(--pk); }
  .col-name.is-fk { color: var(--fk); }
  .col-type { color: var(--muted); margin-left: auto; font-size: 9px; }
  .tbl-more { padding: 2px 9px 5px; color: var(--muted); font-size: 9px; }
</style>
</head>

<div id="tooltip"></div>

// ── card height estimation ────────────────────────────────────────
const CARD_W = 172;
function cardH(t) { return 30 + t.cols.length * 16 + (t.cols.length > 6 ? 16 : 0); }

// ── build DOM ─────────────────────────────────────────────────────
const world = document.getElementById('world');
const svgEl = document.getElementById('svg-layer');
const cards = {};

TABLES.forEach(t => {
  const color = DC[t.domain];
  const el = document.createElement('div');
  el.className = 'tbl-card';
  el.id = 'card-' + t.id;
  el.style.cssText = `left:${t.x}px;top:${t.y}px;width:${CARD_W}px;--accent-color:${color}`;

  const showCols = t.cols.slice(0, 7);
  const extra = t.cols.length - showCols.length;

  el.innerHTML = `
    <div class="tbl-header" style="background:${color}18;border-bottom-color:${color}30">
      <div class="domain-dot" style="background:${color}"></div>
      <div class="tbl-name">${t.label}</div>
    </div>
    <div class="tbl-body">
      ${showCols.map(([n,tp,k])=>`
        <div class="col-row">
          ${k ? `<span class="badge badge-${k}">${k.toUpperCase()}</span>` : '<span style="width:18px"></span>'}
          <span class="col-name${k==='pk'?' is-pk':k==='fk'?' is-fk':''}">${n}</span>
          <span class="col-type">${tp}</span>
        </div>
      `).join('')}
    </div>
    ${extra > 0 ? `<div class="tbl-more">+${extra} more columns…</div>` : ''}
  `;

  el.addEventListener('click', e => { e.stopPropagation(); selectTable(t.id); });
  el.addEventListener('mousemove', e => showTooltip(e, t));
  el.addEventListener('mouseleave', hideTooltip);

  world.appendChild(el);
  cards[t.id] = el;
});

// ── compute card centers ───────────────────────────────────────────
function getCenter(tid) {
  const t = TABLES.find(x => x.id === tid);
  return { x: t.x + CARD_W / 2, y: t.y + cardH(t) / 2 };
}
function getPort(tid, isOut) {
  const t = TABLES.find(x => x.id === tid);
  const cx = t.x + (isOut ? CARD_W : 0);
  const cy = t.y + 14;
  return { x: cx, y: cy };
}

// ── draw SVG edges ────────────────────────────────────────────────
svgEl.style.width = '3000px';
svgEl.style.height = '1400px';

const lineEls = {};
EDGES.forEach((e, i) => {
  const [fromId, toId] = e;
  const color = DC[TABLES.find(x=>x.id===fromId)?.domain] || '#fff';
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('class','fk-line');
  path.setAttribute('stroke', color);
  path.dataset.from = fromId;
  path.dataset.to = toId;
  path.id = `edge-${i}`;
  svgEl.appendChild(path);
  lineEls[i] = path;
});

function updateEdges() {
  EDGES.forEach((e, i) => {
    const [fromId, toId] = e;
    const ft = TABLES.find(x=>x.id===fromId);
    const tt = TABLES.find(x=>x.id===toId);
    if (!ft || !tt) return;

    const fx = ft.x + CARD_W/2, fy = ft.y + 14;
    const tx = tt.x + CARD_W/2, ty = tt.y + 14;

    const dx = tx - fx, dy = ty - fy;
    const cx1 = fx + dx * 0.4;
    const cx2 = tx - dx * 0.4;
    lineEls[i].setAttribute('d', `M${fx},${fy} C${cx1},${fy} ${cx2},${ty} ${tx},${ty}`);
  });
}
updateEdges();

// ── selection logic ───────────────────────────────────────────────
let selectedTable = null;

function selectTable(tid) {
  if (selectedTable === tid) {
    clearSelection();
    return;
  }
  selectedTable = tid;

  const connected = new Set([tid]);
  EDGES.forEach(e => {
    if (e[0] === tid || e[1] === tid) { connected.add(e[0]); connected.add(e[1]); }
  });

  Object.entries(cards).forEach(([id, el]) => {
    el.classList.toggle('selected', id === tid);
    el.classList.toggle('dimmed', !connected.has(id));
  });

  EDGES.forEach((e, i) => {
    const rel = e[0] === tid || e[1] === tid;
    const bothIn = connected.has(e[0]) && connected.has(e[1]);
    lineEls[i].classList.toggle('highlighted', rel);
    lineEls[i].classList.toggle('dimmed', !rel);
  });
}

function clearSelection() {
  selectedTable = null;
  Object.values(cards).forEach(el => {
    el.classList.remove('selected','dimmed');
  });
  Object.values(lineEls).forEach(el => {
    el.classList.remove('highlighted','dimmed');
  });
}

document.getElementById('stage').addEventListener('click', clearSelection);

// ── domain filter ─────────────────────────────────────────────────
let currentDomain = 'all';
function filterDomain(d) {
  currentDomain = d;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+d)?.classList.add('active');
  document.getElementById('btn-all')?.classList.toggle('active', d==='all');

  TABLES.forEach(t => {
    const el = cards[t.id];
    el.style.display = (d === 'all' || t.domain === d) ? '' : 'none';
  });
  EDGES.forEach((e, i) => {
    const ft = TABLES.find(x=>x.id===e[0]);
    const tt = TABLES.find(x=>x.id===e[1]);
    const vis = d === 'all' || ft?.domain === d || tt?.domain === d;
    lineEls[i].style.display = vis ? '' : 'none';
  });
}

// ── search ────────────────────────────────────────────────────────
function onSearch(q) {
  q = q.toLowerCase();
  TABLES.forEach(t => {
    const el = cards[t.id];
    const match = !q || t.label.includes(q) || t.cols.some(c=>c[0].includes(q));
    el.style.opacity = match ? '' : '0.15';
  });
}

// ── pan & zoom ────────────────────────────────────────────────────
let scale = 0.72, ox = 20, oy = 10;
let dragging = false, lx = 0, ly = 0;
const stage = document.getElementById('stage');
const zoomInfo = document.getElementById('zoom-info');

function applyTransform() {
  world.style.transform = `translate(${ox}px,${oy}px) scale(${scale})`;
  zoomInfo.textContent = `${Math.round(scale*100)}% | scroll to zoom • drag to pan • click table to trace FKs`;
}
applyTransform();

stage.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.09;
  const rect = stage.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const newScale = Math.min(2, Math.max(0.2, scale * delta));
  ox = mx - (mx - ox) * (newScale / scale);
  oy = my - (my - oy) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, {passive:false});

stage.addEventListener('mousedown', e => {
  if (e.target.closest('.tbl-card')) return;
  dragging = true; lx = e.clientX; ly = e.clientY;
  stage.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  ox += e.clientX - lx; oy += e.clientY - ly;
  lx = e.clientX; ly = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; stage.classList.remove('grabbing'); });

// ── tooltip ───────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');
function showTooltip(e, t) {
  const color = DC[t.domain];
  const connected = EDGES.filter(ed => ed[0] === t.id || ed[1] === t.id);
  const outbound = connected.filter(ed => ed[0] === t.id).map(ed => `→ ${ed[1]}.${ed[3]}`);
  const inbound  = connected.filter(ed => ed[1] === t.id).map(ed => `← ${ed[0]}.${ed[2]}`);

  let html = `<div class="tt-title" style="color:${color}">${t.id}</div>`;
  html += `<div class="tt-col" style="margin-bottom:4px">${t.cols.length} columns | ${connected.length} FK links</div>`;
  if (outbound.length) html += `<div class="tt-col"><b style="color:#aaa">References:</b><br>${outbound.join('<br>')}</div>`;
  if (inbound.length)  html += `<div class="tt-col" style="margin-top:4px"><b style="color:#aaa">Referenced by:</b><br>${inbound.slice(0,6).join('<br>')}${inbound.length>6?`<br>…+${inbound.length-6} more`:''}</div>`;

  tip.innerHTML = html;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 280 > window.innerWidth) x = e.clientX - 290;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTooltip() { tip.style.display = 'none'; }
document.addEventListener('mousemove', e => { if (tip.style.display !== 'none') moveTip(e); });

// ── keyboard shortcuts ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSelection();
  if (e.key === '0') { scale = 0.72; ox = 20; oy = 10; applyTransform(); }
});
