services:
  postgres:
    image: postgres:16-alpine
    container_name: rcd_postgres
    environment:
      POSTGRES_USER: rcd
      POSTGRES_PASSWORD: rcd
      POSTGRES_DB: rcd_corp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - rcd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rcd -d rcd_corp"]
      interval: 5s
      timeout: 5s
      retries: 10

  generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rcd_generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RCD_POSTGRES_URL: "postgresql+psycopg2://rcd:rcd@postgres:5432/rcd_corp"
    volumes:
      - ./output:/app/output
    command: ["rcd-data", "generate", "--profile", "demo", "--sink", "all"]
    profiles:
      - run

volumes:
  rcd_pgdata:
